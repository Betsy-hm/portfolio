<!DOCTYPE html>
<html>
<body>

<h2 id="cor">#000000</h2>
<button onclick="gerar()">Gerar cor</button>

<script>
function gerar() {
    let cor = "#" + Math.floor(Math.random()*16777215).toString(16);
    document.body.style.background = cor;
    document.getElementById("cor").innerHTML = cor;
}
</script>

</body>
</html>
